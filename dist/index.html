<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>eu4-clone</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; color: #eee; font-family: monospace; }
    #game { display: block; width: 100vw; height: 100vh; background: #000; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script type="module">
    // ---- WebGPU diagnostics ----
    // These run before the wasm boots, so we get info regardless of whether
    // wgpu's WebGPU backend panics on this browser.
    console.group('webgpu diagnostics');
    console.log('userAgent:', navigator.userAgent);
    console.log('navigator.gpu:', !!navigator.gpu);

    if (navigator.gpu) {
      console.log('navigator.gpu object:', navigator.gpu);
      try {
        const adapter = await navigator.gpu.requestAdapter();
        console.log('requestAdapter() ->', adapter);
        if (adapter) {
          console.log('adapter.info:', adapter.info);
          // Try to confirm we can actually get a device.
          const device = await adapter.requestDevice();
          console.log('requestDevice() ->', device);
        } else {
          console.warn('adapter is null — navigator.gpu exists but cannot create adapters');
        }
      } catch (e) {
        console.error('WebGPU adapter/device acquisition threw:', e);
      }

      // Inspect what canvas.getContext("webgpu") actually gives us — this is what
      // wgpu's broken downcast is operating on.
      try {
        const probe = document.createElement('canvas');
        const ctx = probe.getContext('webgpu');
        console.log('canvas.getContext("webgpu") ->', ctx);
        console.log('  ctor name:', ctx?.constructor?.name);
        console.log('  instanceof GPUCanvasContext:',
          typeof GPUCanvasContext !== 'undefined' && ctx instanceof GPUCanvasContext);
      } catch (e) {
        console.error('getContext("webgpu") threw:', e);
      }
    }
    console.groupEnd();

    import init from './app.js';
    await init();
  </script>
</body>
</html>
